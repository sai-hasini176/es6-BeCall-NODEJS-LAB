<script>
async function fetchUserTable() {
    try {
        let response = await fetch('https://jsonplaceholder.typicode.com/users');
        let users = await response.json();
        console.log(users);
        let tableHTML = `
            <table class="w3-table-all w3-card-4 w3-hoverable">
                <thead>
                    <tr class="w3-green">
                        <th>ID</th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>City</th>
                        <th>Website</th>
                    </tr>
                </thead>
                <tbody>`;

        users.forEach(user => {
            tableHTML += `
                tr>
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${user.address.city}</td>
                    <td>${user.website}</td>
                </tr>`;
        });

        tableHTML += `</tbody></table>`;

        document.getElementById('userTableContainer').innerHTML = tableHTML;
    } catch (error) {
        console.error('Error fetching data:', error);
        document.getElementById('userTableContainer').innerHTML = 
            '<p class="w3-text-red">Failed to load user data.</p>';
    }
}

// Call the function to load the table
fetchUserTable();

</script>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<div class="w3-container w3-margin-top">
    <div id="userTableContainer" class="w3-responsive">
        </div>
</div>
